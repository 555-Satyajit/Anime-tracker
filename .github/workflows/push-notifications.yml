name: Push Notifications Cron

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  # Allow manual trigger from GitHub Actions dashboard
  workflow_dispatch:

jobs:
  trigger-push-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Hit airing API endpoint
        run: |
          curl -X GET "https://www.senkaihub.com/api/cron/airing" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail
